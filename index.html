<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.5">
  <title>NYSC 2026 SAED Attendance</title>
  <!-- Font Awesome 6 (free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
    }

    body {
      background: #eef6ee;
      min-height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
      background-image: radial-gradient(circle at 10% 20%, rgba(0,80,0,0.03) 0%, transparent 30%),
                        radial-gradient(circle at 90% 70%, rgba(0,100,0,0.04) 0%, transparent 40%);
    }

    .app-wrapper {
      max-width: 1500px;
      width: 100%;
      background: rgba(255, 255, 255, 0.93);
      backdrop-filter: blur(3px);
      border-radius: 48px 48px 32px 32px;
      padding: 24px 28px 32px;
      box-shadow: 0 25px 45px rgba(0, 40, 0, 0.2);
      border: 2px solid #1a6e1a;
      position: relative;
      overflow: hidden;
    }

    /* watermark-like logo background */
    .app-wrapper::before {
      content: "NYSC";
      position: absolute;
      right: -20px;
      bottom: -20px;
      font-size: 180px;
      font-weight: 800;
      color: rgba(0, 80, 0, 0.04);
      pointer-events: none;
      transform: rotate(-8deg);
      letter-spacing: 8px;
      z-index: 0;
    }

    /* header with logo + title */
    .header {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      background: linear-gradient(135deg, #f5fcf5, #e2f0e2);
      border-radius: 80px;
      padding: 8px 18px 8px 12px;
      border: 2px solid #1d7a1d;
      margin-bottom: 24px;
      position: relative;
      z-index: 2;
      box-shadow: 0 6px 0 #c0ddc0;
    }

    .logo-group {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .nysc-logo-box {
      background: #0a4f0a;
      border-radius: 60px;
      padding: 8px 20px 8px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      box-shadow: 0 4px 0 #1d6b1d;
    }

    .nysc-logo-box i {
      font-size: 36px;
      color: #d9f0d9;
      filter: drop-shadow(0 2px 2px rgba(0,0,0,0.2));
    }

    .nysc-logo-box span {
      font-weight: 800;
      color: white;
      letter-spacing: 2px;
      font-size: 1.2rem;
      background: #1e7a1e;
      padding: 2px 12px;
      border-radius: 40px;
    }

    h1 {
      color: #054005;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: 1px;
      line-height: 1.2;
    }

    h1 small {
      font-size: 1rem;
      font-weight: 500;
      color: #1f711f;
      display: block;
      margin-top: -4px;
    }

    .mentor-area {
      background: #e2f3e2;
      padding: 6px 22px 6px 18px;
      border-radius: 60px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 20px;
      border: 2px solid #1e7a1e;
    }

    .mentor-item {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #0a4f0a;
      font-weight: 500;
      font-size: 0.95rem;
    }

    .mentor-item i {
      color: #1d6b1d;
      width: 20px;
    }

    .mentor-item input {
      border: none;
      background: white;
      padding: 6px 14px;
      border-radius: 40px;
      border: 2px solid #a8cfa8;
      font-weight: 500;
      width: 150px;
      color: #023102;
      transition: 0.1s;
    }

    .mentor-item input:focus {
      outline: 2px solid #1f7a1f;
      border-color: transparent;
    }

    /* department grid */
    .dept-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 28px 22px;
      margin-top: 12px;
      position: relative;
      z-index: 2;
    }

    .dept-card {
      background: #fafffa;
      border-radius: 30px;
      padding: 18px 18px 20px;
      box-shadow: 0 8px 16px rgba(0, 40, 0, 0.06);
      border: 2px solid #b8d9b8;
      transition: 0.15s;
      backdrop-filter: blur(2px);
    }

    .dept-card:hover {
      border-color: #2b8c2b;
      box-shadow: 0 12px 20px rgba(0, 70, 0, 0.08);
    }

    .dept-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 2px dashed #9ac09a;
      padding-bottom: 10px;
      margin-bottom: 14px;
    }

    .dept-name {
      font-size: 1.25rem;
      font-weight: 700;
      color: #043804;
      background: #daf0da;
      padding: 0 18px 0 14px;
      border-radius: 50px;
      line-height: 2.2rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .dept-name i {
      color: #1a6b1a;
      font-size: 1rem;
    }

    .dept-actions button {
      background: none;
      border: none;
      font-size: 1.1rem;
      color: #1b6b1b;
      cursor: pointer;
      padding: 6px 10px;
      border-radius: 30px;
      transition: 0.1s;
    }

    .dept-actions button:hover {
      background: #cde6cd;
    }

    .dept-actions .delete-dept {
      color: #b33b3b;
    }
    .dept-actions .delete-dept:hover {
      background: #fcdada;
      color: #a00;
    }

    .attendance-meta {
      background: #e8f3e8;
      border-radius: 40px;
      padding: 10px 14px;
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 6px 16px;
      font-size: 0.85rem;
      font-weight: 500;
      color: #144014;
      margin-bottom: 16px;
      border: 1px solid #b3d3b3;
    }

    .meta-item {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .meta-item i {
      color: #1a6b1a;
      width: 18px;
    }

    .meta-item input, .meta-item select {
      border: 2px solid #9ac09a;
      background: white;
      padding: 2px 8px;
      border-radius: 30px;
      font-weight: 500;
      color: #003300;
      max-width: 110px;
      font-size: 0.85rem;
    }

    .meta-item input[type="time"] { max-width: 100px; }
    .meta-item input[type="date"] { max-width: 120px; }

    .participant-list {
      list-style: none;
      margin: 10px 0 8px;
      max-height: 180px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .participant-list li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: white;
      padding: 6px 12px 6px 18px;
      margin-bottom: 5px;
      border-radius: 40px;
      border-left: 6px solid #2d7a2d;
      box-shadow: 0 2px 6px rgba(0, 40, 0, 0.04);
      font-size: 0.95rem;
    }

    .participant-list .snum {
      font-weight: 600;
      color: #1b5e1b;
      margin-right: 10px;
      min-width: 28px;
    }

    .participant-list .pname {
      flex: 1;
      color: #023102;
      font-weight: 500;
    }

    .participant-list .del-btn {
      background: none;
      border: none;
      color: #b34747;
      cursor: pointer;
      font-size: 1rem;
      padding: 0 6px;
    }

    .participant-list .del-btn:hover {
      color: #7a1f1f;
      transform: scale(1.15);
    }

    .add-participant {
      display: flex;
      gap: 8px;
      margin: 12px 0 6px;
    }

    .add-participant input {
      flex: 1;
      border: 2px solid #8fc08f;
      border-radius: 40px;
      padding: 8px 16px;
      font-weight: 500;
      background: white;
    }

    .add-participant input:focus {
      border-color: #1b731b;
      outline: none;
    }

    .add-participant button {
      background: #1a7a1a;
      border: none;
      border-radius: 40px;
      padding: 0 22px;
      color: white;
      font-weight: 700;
      cursor: pointer;
      transition: 0.1s;
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
    }

    .add-participant button:hover {
      background: #0d5f0d;
      transform: scale(0.97);
    }

    .dept-total {
      margin-top: 14px;
      font-weight: 600;
      color: #0a470a;
      border-top: 1px solid #b8d9b8;
      padding-top: 10px;
      display: flex;
      justify-content: space-between;
      font-size: 0.95rem;
    }

    .dept-total span {
      background: #d7ecd7;
      padding: 0 20px;
      border-radius: 40px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .add-dept-btn {
      background: #0f5f0f;
      border: none;
      color: white;
      font-size: 1.2rem;
      padding: 14px 34px;
      border-radius: 80px;
      display: inline-flex;
      align-items: center;
      gap: 14px;
      margin: 20px auto 8px;
      cursor: pointer;
      font-weight: 600;
      box-shadow: 0 6px 0 #083308;
      transition: 0.07s linear;
      border: 2px solid #b4d6b4;
    }

    .add-dept-btn:active {
      transform: translateY(4px);
      box-shadow: 0 2px 0 #083308;
    }

    .footer-actions {
      display: flex;
      justify-content: center;
      margin-top: 12px;
      position: relative;
      z-index: 2;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #daeeda; border-radius: 10px; }
    ::-webkit-scrollbar-thumb { background: #2b7a2b; border-radius: 10px; }

    @media (max-width: 750px) {
      .header { flex-direction: column; align-items: stretch; }
      .mentor-area { flex-direction: column; align-items: stretch; }
      .mentor-item input { width: 100%; }
      .dept-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
<div class="app-wrapper" id="appWrapper">
  <!-- header -->
  <div class="header">
    <div class="logo-group">
      <div class="nysc-logo-box">
        <i class="fas fa-flag-checkered"></i>
        <span>NYSC</span>
      </div>
      <h1>2026 SAED <small>CLASS ATTENDANCE</small></h1>
    </div>
    <div class="mentor-area">
      <div class="mentor-item"><i class="fas fa-user-tie"></i> Mentor</div>
      <div class="mentor-item"><i class="fas fa-user"></i> <input type="text" id="mentorName" placeholder="Full name" value="Mr. Adebayo"></div>
      <div class="mentor-item"><i class="fas fa-phone-alt"></i> <input type="text" id="mentorPhone" placeholder="Phone" value="080-1234-5678"></div>
    </div>
  </div>

  <!-- department grid -->
  <div id="deptGrid" class="dept-grid"></div>

  <!-- add department button -->
  <div class="footer-actions">
    <button class="add-dept-btn" id="addDeptBtn"><i class="fas fa-plus-circle"></i> Add Department</button>
  </div>
</div>

<script>
  (function() {
    // ----- initial departments (exactly as specified) -----
    const deptNames = [
      'ICT', 'Poultry', 'Makeup & Gele', 'Knitting', 'Cyber Security',
      'Photography & Filming', 'Fashion Design', 'Shoe Making', 'Event Decoration',
      'Construction Aluminium', 'Baking', 'Bag Making', 'Catering', 'Beads Making',
      'Automobile', 'Food Processing', 'Painting & Screeding', 'Barbing',
      'Power & Energy', 'Cosmetology', 'Tye & Dye'
    ];

    let departments = [];

    function uid() { return Date.now() + '-' + Math.random().toString(36).substr(2, 8); }

    function defaultMeta() {
      const now = new Date();
      const dateStr = now.toISOString().slice(0,10);
      const timeStr = now.toTimeString().slice(0,5);
      return {
        day: 'Monday',
        date: dateStr,
        time: timeStr,
        year: now.getFullYear().toString(),
        classTime: '09:30'
      };
    }

    function createDepartment(name) {
      const meta = defaultMeta();
      return {
        id: uid(),
        name: name,
        participants: [],
        meta: meta
      };
    }

    // populate initial departments
    deptNames.forEach(d => departments.push(createDepartment(d)));

    const grid = document.getElementById('deptGrid');

    // ---------- render ----------
    function render() {
      grid.innerHTML = '';
      departments.forEach((dept) => {
        const card = document.createElement('div');
        card.className = 'dept-card';
        card.dataset.id = dept.id;

        // header
        const header = document.createElement('div');
        header.className = 'dept-header';
        header.innerHTML = `
          <span class="dept-name"><i class="fas fa-users"></i> ${dept.name}</span>
          <div class="dept-actions">
            <button class="delete-dept" data-id="${dept.id}" title="Delete department"><i class="fas fa-trash-alt"></i></button>
          </div>
        `;
        card.appendChild(header);

        // meta fields
        const metaDiv = document.createElement('div');
        metaDiv.className = 'attendance-meta';
        metaDiv.innerHTML = `
          <span class="meta-item"><i class="fas fa-calendar-day"></i> <input type="text" class="meta-day" value="${dept.meta.day}" placeholder="Day"></span>
          <span class="meta-item"><i class="fas fa-calendar-alt"></i> <input type="date" class="meta-date" value="${dept.meta.date}"></span>
          <span class="meta-item"><i class="fas fa-clock"></i> <input type="time" class="meta-time" value="${dept.meta.time}"></span>
          <span class="meta-item"><i class="fas fa-calendar"></i> <input type="number" class="meta-year" value="${dept.meta.year}" min="2020" max="2030" style="max-width:70px;"></span>
          <span class="meta-item"><i class="fas fa-hourglass-start"></i> <input type="time" class="meta-classtime" value="${dept.meta.classTime}"></span>
        `;
        card.appendChild(metaDiv);

        // participant list
        const list = document.createElement('ul');
        list.className = 'participant-list';
        list.id = `list-${dept.id}`;
        dept.participants.forEach((p, i) => {
          const li = document.createElement('li');
          li.innerHTML = `
            <span class="snum">${i+1}</span>
            <span class="pname">${p}</span>
            <button class="del-btn" data-id="${dept.id}" data-index="${i}"><i class="fas fa-user-minus"></i></button>
          `;
          list.appendChild(li);
        });
        card.appendChild(list);

        // add participant
        const addDiv = document.createElement('div');
        addDiv.className = 'add-participant';
        addDiv.innerHTML = `
          <input type="text" placeholder="Add name ..." class="add-input" data-id="${dept.id}">
          <button class="add-btn" data-id="${dept.id}"><i class="fas fa-user-plus"></i> Add</button>
        `;
        card.appendChild(addDiv);

        // total + serial
        const totalDiv = document.createElement('div');
        totalDiv.className = 'dept-total';
        const count = dept.participants.length;
        totalDiv.innerHTML = `
          <span><i class="fas fa-hashtag"></i> Serial: ${count}</span>
          <span><i class="fas fa-user-friends"></i> Total: ${count}</span>
        `;
        card.appendChild(totalDiv);

        grid.appendChild(card);
      });

      attachEvents();
    }

    // ---------- event binding ----------
    function attachEvents() {
      // delete department
      document.querySelectorAll('.delete-dept').forEach(btn => {
        btn.onclick = function(e) {
          e.stopPropagation();
          const id = this.dataset.id;
          const dept = departments.find(d => d.id === id);
          if (!dept) return;
          if (confirm(`Delete department "${dept.name}" ?`)) {
            departments = departments.filter(d => d.id !== id);
            render();
          }
        };
      });

      // add participant
      document.querySelectorAll('.add-btn').forEach(btn => {
        btn.onclick = function() {
          const id = this.dataset.id;
          const input = document.querySelector(`.add-input[data-id="${id}"]`);
          const name = input.value.trim();
          if (name === '') return alert('Please enter a name');
          const dept = departments.find(d => d.id === id);
          if (dept) {
            dept.participants.push(name);
            render();
          }
        };
      });

      // delete participant
      document.querySelectorAll('.del-btn').forEach(btn => {
        btn.onclick = function() {
          const id = this.dataset.id;
          const index = parseInt(this.dataset.index);
          const dept = departments.find(d => d.id === id);
          if (dept) {
            dept.participants.splice(index, 1);
            render();
          }
        };
      });

      // meta updates (on change)
      document.querySelectorAll('.meta-day, .meta-date, .meta-time, .meta-year, .meta-classtime').forEach(el => {
        el.onchange = function() {
          const card = this.closest('.dept-card');
          if (!card) return;
          const id = card.dataset.id;
          const dept = departments.find(d => d.id === id);
          if (!dept) return;
          if (this.classList.contains('meta-day')) dept.meta.day = this.value;
          else if (this.classList.contains('meta-date')) dept.meta.date = this.value;
          else if (this.classList.contains('meta-time')) dept.meta.time = this.value;
          else if (this.classList.contains('meta-year')) dept.meta.year = this.value;
          else if (this.classList.contains('meta-classtime')) dept.meta.classTime = this.value;
        };
      });

      // enter key on add input
      document.querySelectorAll('.add-input').forEach(inp => {
        inp.onkeypress = function(e) {
          if (e.key === 'Enter') {
            const btn = this.parentElement.querySelector('.add-btn');
            if (btn) btn.click();
          }
        };
      });
    }

    // add new department
    document.getElementById('addDeptBtn').addEventListener('click', function() {
      let name = prompt('Enter new department name:');
      if (name && name.trim() !== '') {
        departments.push(createDepartment(name.trim()));
        render();
      } else if (name !== null) {
        alert('Name cannot be empty');
      }
    });

    // initial render
    render();

    // mentor fields are just UI (already pre-filled)
    // if you want to store/retrieve from localStorage, can be added, but not required.
  })();
</script>
</body>
</html>
