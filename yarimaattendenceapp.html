<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Yarima · attendance</title>
  <!-- CSS (embedded) -->
  <style>
    /* ----- global reset & white font ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #0b2a3b 0%, #1a3f52 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Roboto, system-ui, -apple-system, sans-serif;
      padding: 1.5rem;
      margin: 0;
    }

    /* main card – all text white */
    .attendance-card {
      max-width: 780px;
      width: 100%;
      background: rgba(255, 255, 255, 0.08);
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 2.5rem;
      padding: 2rem 2rem 2.5rem;
      box-shadow: 0 25px 40px -12px rgba(0, 0, 0, 0.6);
      transition: all 0.2s ease;
      color: white; /* base white for everything inside */
    }

    /* force all text white, including inputs, labels, etc. */
    .attendance-card,
    .attendance-card * {
      color: white !important;
    }

    /* heading with yarima name */
    .brand {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
      padding-bottom: 0.75rem;
      margin-bottom: 2rem;
      flex-wrap: wrap;
    }

    .brand h1 {
      font-weight: 500;
      font-size: 2.2rem;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    .brand h1 span {
      background: rgba(255, 215, 0, 0.25);
      padding: 0.1rem 0.8rem;
      border-radius: 40px;
      font-weight: 600;
      font-size: 1.8rem;
      border: 1px solid rgba(255, 215, 0, 0.3);
      color: #ffe484 !important;
    }

    .badge {
      background: rgba(255, 255, 255, 0.08);
      padding: 0.3rem 1rem;
      border-radius: 40px;
      font-size: 0.9rem;
      border: 1px solid rgba(255, 255, 255, 0.2);
      backdrop-filter: blur(2px);
    }

    /* student list */
    .student-list {
      list-style: none;
      margin: 1.5rem 0 2rem;
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
    }

    .student-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(255, 255, 255, 0.05);
      padding: 0.7rem 1.4rem;
      border-radius: 60px;
      border: 1px solid rgba(255, 255, 255, 0.08);
      transition: background 0.15s;
      backdrop-filter: blur(2px);
    }

    .student-item:hover {
      background: rgba(255, 255, 255, 0.1);
    }

    .student-name {
      font-weight: 500;
      font-size: 1.15rem;
      letter-spacing: 0.3px;
    }

    .student-name small {
      opacity: 0.7;
      font-weight: 300;
      margin-left: 0.5rem;
      font-size: 0.8rem;
    }

    .status-badge {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .status-indicator {
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #4caf50;
      box-shadow: 0 0 10px #4caf50aa;
      transition: 0.2s;
    }

    .status-indicator.absent {
      background: #f44336;
      box-shadow: 0 0 12px #f44336aa;
    }

    .toggle-btn {
      background: rgba(255, 255, 255, 0.06);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 0.3rem 1.2rem;
      border-radius: 40px;
      font-weight: 500;
      font-size: 0.8rem;
      cursor: pointer;
      transition: 0.15s;
      letter-spacing: 0.3px;
      backdrop-filter: blur(2px);
      color: white !important;
    }

    .toggle-btn:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.5);
    }

    .toggle-btn:active {
      transform: scale(0.95);
    }

    /* controls + alarm */
    .action-bar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: space-between;
      gap: 1rem 0.8rem;
      margin: 2rem 0 0.8rem;
      padding-top: 1.2rem;
      border-top: 1px solid rgba(255, 255, 255, 0.1);
    }

    .left-actions {
      display: flex;
      gap: 0.8rem;
      flex-wrap: wrap;
    }

    .btn {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.2);
      padding: 0.6rem 1.6rem;
      border-radius: 60px;
      font-weight: 500;
      font-size: 0.9rem;
      cursor: pointer;
      backdrop-filter: blur(2px);
      transition: 0.15s;
      color: white !important;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary {
      background: rgba(76, 175, 80, 0.25);
      border-color: #4caf70;
      box-shadow: 0 0 12px #4caf5030;
    }

    .btn-primary:hover {
      background: rgba(76, 175, 80, 0.4);
      border-color: #66bb7a;
    }

    .btn-danger {
      background: rgba(244, 67, 54, 0.2);
      border-color: #f44336;
    }

    .btn-danger:hover {
      background: rgba(244, 67, 54, 0.35);
    }

    .alarm-area {
      display: flex;
      align-items: center;
      gap: 1rem;
      background: rgba(255, 215, 0, 0.08);
      padding: 0.2rem 1.2rem 0.2rem 1.8rem;
      border-radius: 60px;
      border: 1px solid rgba(255, 215, 0, 0.15);
    }

    .alarm-area span {
      font-size: 0.95rem;
      font-weight: 400;
    }

    .alarm-badge {
      background: #ffb300;
      color: #0b1e28 !important;
      font-weight: 700;
      padding: 0.2rem 1rem;
      border-radius: 40px;
      font-size: 0.8rem;
      letter-spacing: 0.3px;
    }

    .alarm-badge.active {
      background: #ff6f00;
      color: white !important;
      animation: pulse-alarm 0.9s infinite alternate;
    }

    @keyframes pulse-alarm {
      0% { opacity: 0.7; transform: scale(0.96); }
      100% { opacity: 1; transform: scale(1.04); }
    }

    /* footer */
    .footer-note {
      text-align: right;
      font-size: 0.7rem;
      opacity: 0.5;
      margin-top: 1rem;
      letter-spacing: 0.5px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
      padding-top: 0.8rem;
    }

    /* mobile friendly */
    @media (max-width: 520px) {
      .attendance-card { padding: 1.5rem; }
      .brand h1 { font-size: 1.6rem; }
      .brand h1 span { font-size: 1.3rem; }
      .student-item { flex-wrap: wrap; gap: 0.4rem; }
      .action-bar { flex-direction: column; align-items: stretch; }
      .alarm-area { justify-content: center; }
    }

    /* override for placeholder */
    ::-webkit-input-placeholder { color: rgba(255,255,255,0.5) !important; }
    :-moz-placeholder { color: rgba(255,255,255,0.5) !important; }
  </style>
</head>
<body>

<div class="attendance-card" id="app">
  <!-- header with YARIMA name -->
  <div class="brand">
    <h1>
      📋 <span>YARIMA</span>
    </h1>
    <div class="badge">attendance · 2026</div>
  </div>

  <!-- student list generated by JS -->
  <ul class="student-list" id="studentList"></ul>

  <!-- controls + alarm -->
  <div class="action-bar">
    <div class="left-actions">
      <button class="btn btn-primary" id="markAllPresent">✅ Mark all present</button>
      <button class="btn btn-danger" id="markAllAbsent">❌ Mark all absent</button>
    </div>
    <div class="alarm-area" id="alarmArea">
      <span>🔔</span>
      <span id="alarmText">alarm ready</span>
      <span class="alarm-badge" id="alarmBadge">●</span>
    </div>
  </div>

  <!-- footer: yarima signature -->
  <div class="footer-note">Yarima · attendance system</div>
</div>

<!-- JavaScript (embedded) -->
<script>
  (function() {
    "use strict";

    // ----- STUDENT DATA (with names) -----
    const studentNames = [
      "Aisha", "Bello", "Chioma", "David", "Emeka",
      "Fatima", "Gideon", "Halima", "Ifeanyi", "James",
      "Kemi", "Lami", "Musa", "Ngozi", "Obi",
      "Precious", "Qudus", "Ruth", "Suleiman", "Tunde",
      "Uche", "Victoria", "Wale", "Xavier", "Yakubu",
      "Zainab", "YARIMA"   // explicit YARIMA name included
    ];

    // state: array of objects { name, present }
    let students = [];

    // DOM references
    const listEl = document.getElementById('studentList');
    const alarmText = document.getElementById('alarmText');
    const alarmBadge = document.getElementById('alarmBadge');
    const markAllPresentBtn = document.getElementById('markAllPresent');
    const markAllAbsentBtn = document.getElementById('markAllAbsent');

    // alarm state
    let alarmActive = false;
    let alarmInterval = null;
    let audioCtx = null;

    // ----- helper: play alarm (beep) -----
    function playAlarmBeep() {
      try {
        // create audio context if not exists
        if (!audioCtx) {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        // beep using oscillator
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        oscillator.frequency.value = 880; // A5
        oscillator.type = 'square';
        gainNode.gain.setValueAtTime(0.25, audioCtx.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
        oscillator.start(audioCtx.currentTime);
        oscillator.stop(audioCtx.currentTime + 0.25);
      } catch (e) {
        // fallback: do nothing (some browsers block autoplay)
        console.warn('alarm beep blocked or audio not supported');
      }
    }

    // start alarm (repeating beeps)
    function startAlarm() {
      if (alarmActive) return;
      alarmActive = true;
      alarmBadge.classList.add('active');
      alarmText.textContent = '🔊 ALARM ACTIVE';
      // beep immediately
      playAlarmBeep();
      // repeat every 2.2 seconds
      if (alarmInterval) clearInterval(alarmInterval);
      alarmInterval = setInterval(() => {
        if (alarmActive) {
          playAlarmBeep();
        }
      }, 2200);
    }

    // stop alarm
    function stopAlarm() {
      alarmActive = false;
      if (alarmInterval) {
        clearInterval(alarmInterval);
        alarmInterval = null;
      }
      alarmBadge.classList.remove('active');
      alarmText.textContent = 'alarm ready';
    }

    // ----- check for absent students -> trigger alarm -----
    function evaluateAlarm() {
      const anyAbsent = students.some(s => !s.present);
      if (anyAbsent) {
        startAlarm();
      } else {
        stopAlarm();
      }
    }

    // ----- render student list -----
    function render() {
      // build html
      let html = '';
      students.forEach((student, index) => {
        const statusClass = student.present ? '' : 'absent';
        const statusLabel = student.present ? 'Present' : 'Absent';
        // mark YARIMA with a small star
        const isYarima = student.name.toUpperCase() === 'YARIMA';
        const nameDisplay = isYarima ? `${student.name} ⭐` : student.name;
        html += `
          <li class="student-item" data-index="${index}">
            <span class="student-name">${nameDisplay} <small>#${index+1}</small></span>
            <div class="status-badge">
              <span class="status-indicator ${statusClass}"></span>
              <button class="toggle-btn" data-index="${index}">${statusLabel}</button>
            </div>
          </li>
        `;
      });
      listEl.innerHTML = html;

      // attach event listeners to toggle buttons
      document.querySelectorAll('.toggle-btn').forEach(btn => {
        btn.addEventListener('click', function(e) {
          e.stopPropagation();
          const idx = parseInt(this.getAttribute('data-index'), 10);
          if (!isNaN(idx) && idx >= 0 && idx < students.length) {
            // toggle attendance
            students[idx].present = !students[idx].present;
            // re-render and evaluate alarm
            render();
            evaluateAlarm();
          }
        });
      });
    }

    // ----- initialise students -----
    function initStudents() {
      students = studentNames.map(name => ({
        name: name,
        present: true   // default: all present
      }));
    }

    // ----- mark all present -----
    function markAllPresent() {
      students.forEach(s => s.present = true);
      render();
      evaluateAlarm();
    }

    // ----- mark all absent -----
    function markAllAbsent() {
      students.forEach(s => s.present = false);
      render();
      evaluateAlarm();
    }

    // ----- attach global buttons -----
    markAllPresentBtn.addEventListener('click', markAllPresent);
    markAllAbsentBtn.addEventListener('click', markAllAbsent);

    // ----- manual alarm trigger (optional) hidden feature: click on alarm area toggles? no, just for demo we keep it as alarm indicator.
    // but we also add a small double-click on alarm area to stop alarm manually? 
    // better: double-click alarm area stops alarm (convenience)
    const alarmArea = document.getElementById('alarmArea');
    alarmArea.addEventListener('dblclick', function(e) {
      if (alarmActive) {
        stopAlarm();
        // also set all present? no, just stop alarm but keep state
        // reflect in ui
        alarmText.textContent = '⏸ alarm stopped (manual)';
        setTimeout(() => {
          if (!alarmActive) alarmText.textContent = 'alarm ready';
        }, 2000);
      }
    });

    // ----- start app -----
    initStudents();
    render();
    // evaluate initial alarm (all present → no alarm)
    evaluateAlarm();

    // extra: if user clicks on any student row, we can also toggle? but we already have button.
    // we also attach a small reset for audio context on user gesture (first click anywhere)
    document.addEventListener('click', function initAudio() {
      if (!audioCtx) {
        try {
          audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        } catch (_) {}
      }
    }, { once: true });

    console.log('✅ Yarima attendance system ready · font white · alarm enabled');
  })();
</script>
</body>
</html>
